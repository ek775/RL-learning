[project]
name = "RL"
version = "0.1.0"
description = "A reinforcement learning project"
authors = [
    { name = "me", email = "me@example.com" },
    { name = "myself", email = "myself@example.com" },
    { name = "I", email = "i@example.com" },
]
license = { file = "LICENSE" }
requires-python = ">=3.14"

dependencies = [
    "torch",
    "tensorboard",
    "transformers",
    "datasets",
    "pandas",
    "jupyter",
    "matplotlib",
    "tqdm",
]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

# AMD ROCm — pip does not auto-detect the driver.
# Use this source for torch/torchvision so the ROCm wheel is resolved correctly.
# Install with:  pip install -e ".[rocm]"
# or:            pip install torch torchvision --index-url https://download.pytorch.org/whl/rocm6.2
[project.optional-dependencies]
rocm = [
    "torch --index-url https://pytorch.org",
    "torchvision --index-url https://pytorch.org",
]

[tool.setuptools]
package-dir = {"rl" = "src"}
packages = ["rl"]